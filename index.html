<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Augmentiverse Cat AR — Multi-Platform</title>

  <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.5.1/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/fcor/aframe-gesture-detector-component/master/dist/aframe-gesture-detector.component.min.js"></script>
  
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: transparent;
    }

    #overlay {
      position: fixed;
      z-index: 20;
      inset: 0;
      pointer-events: none;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }

    #topbar {
      margin: 12px;
      padding: 10px 12px;
      max-width: 520px;
      border-radius: 12px;
      background: rgba(0, 0, 0, 0.62);
      color: white;
      font-size: 14px;
      line-height: 1.35;
      backdrop-filter: blur(8px);
    }

    #status {
      margin: 12px;
      align-self: flex-start;
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0, 0, 0, 0.62);
      color: white;
      font-size: 13px;
      backdrop-filter: blur(8px);
    }

    .found { background: rgba(0, 120, 60, 0.75) !important; }
    .lost { background: rgba(130, 70, 0, 0.75) !important; }

    #startButton {
      position: fixed;
      z-index: 30;
      left: 50%;
      bottom: 28px;
      transform: translateX(-50%);
      padding: 14px 22px;
      border: 0;
      border-radius: 999px;
      background: white;
      color: black;
      font-weight: 700;
      font-size: 15px;
      cursor: pointer;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.35);
    }

    #startButton.hidden { display: none; }

    .hide-video video {
      display: none !important;
      opacity: 0 !important;
    }

    video {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      object-fit: cover;
      z-index: 1;
    }

    .a-canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      z-index: 2;
    }
  </style>

  <script>
    // FIX: Core system component handles WebXR lifecycle safely to prevent "AR Errors"
    AFRAME.registerSystem('quest-xr-handler', {
      init: function () {
        const sceneEl = this.sceneEl;
        
        sceneEl.addEventListener('webxrsessionrequested', async () => {
          const imgEl = document.querySelector('#questTargetImage');
          if (imgEl) {
            if (!imgEl.complete) await new Promise(r => imgEl.onload = r);
            const bitmap = await createImageBitmap(imgEl);
            
            // Assign parameters during initialization handshake safe zone
            sceneEl.systems['webxr'].sessionConfiguration.trackedImages = [
              {
                image: bitmap,
                widthInMeters: 0.2
              }
            ];
          }
        });
      }
    });

    AFRAME.registerComponent('quest-image-tracker', {
      init: function () {
        this.userRotationY = 0;
        this.userScaleMod = 1.0;
      },
      
      tick: function () {
        const sceneEl = this.el;
        const session = sceneEl.renderer.xr.getSession();
        if (!session || !sceneEl.is('vr-mode')) return;
        
        const frame = sceneEl.frame;
        if (!frame || !frame.getImageTrackingResults) return;
        
        const results = frame.getImageTrackingResults();
        const catTarget = document.querySelector("#catTarget");
        const gestureContainer = document.querySelector("#gestureContainer");
        const statusEl = document.querySelector("#status");

        if (results.length > 0) {
          const result = results[0];
          if (result.trackingState === 'tracked') {
            statusEl.textContent = "Cat image found — Matrix anchored";
            statusEl.className = "found";
            
            const refSpace = sceneEl.renderer.xr.getReferenceSpace();
            const pose = frame.getPose(result.imageSpace, refSpace);
            
            if (pose) {
              catTarget.object3D.position.set(
                pose.transform.position.x,
                pose.transform.position.y,
                pose.transform.position.z
              );
              catTarget.object3D.quaternion.set(
                pose.transform.orientation.x,
                pose.transform.orientation.y,
                pose.transform.orientation.z,
                pose.transform.orientation.w
              );
              catTarget.object3D.visible = true;

              for (const inputSource of session.inputSources) {
                if (inputSource.gamepad) {
                  const axes = inputSource.gamepad.axes; 
                  if (Math.abs(axes[0]) > 0.1) {
                    this.userRotationY += axes[0] * 0.04; 
                  }
                  if (Math.abs(axes[1]) > 0.1) {
                    this.userScaleMod -= axes[1] * 0.02;
                    this.userScaleMod = Math.min(Math.max(this.userScaleMod, 0.1), 3.0);
                  }
                }
              }

              gestureContainer.object3D.rotation.y = this.userRotationY;
              gestureContainer.object3D.scale.set(this.userScaleMod, this.userScaleMod, this.userScaleMod);
            }
          } else {
            statusEl.textContent = "Target lost — point at the cat image";
            statusEl.className = "lost";
          }
        }
      }
    });
  </script>
</head>

<body>
  <div id="overlay">
    <div id="topbar">
      Point your camera at the printed cat image. The GLB object will appear anchored above the image.
    </div>
    <div id="status" class="lost">Target not found</div>
  </div>

  <button id="startButton">Start AR</button>

  <a-scene
    id="scene"
    quest-xr-handler
    gesture-detector
    quest-image-tracker
    webxr="optionalFeatures: image-tracking, local-floor;"
    mindar-image="imageTargetSrc: targets.mind; autoStart: false;"
    embedded
    renderer="colorManagement: true; antialias: true; alpha: true;">

    <a-assets timeout="30000">
      <a-asset-item id="anchoredModel" src="happy.glb"></a-asset-item>
      <img id="questTargetImage" src="cat-print-target.png" crossorigin="anonymous">
    </a-assets>

    <a-camera position="0 0 0" look-controls="false">
      <a-cursor raycaster="objects: .clickable" fuse="false"></a-cursor>
    </a-camera>

    <a-entity id="catTarget" mindar-image-target="targetIndex: 0" visible="true">
      <a-entity 
        id="gestureContainer" 
        class="clickable"
        visible="true"
        gesture-handler="minScale: 0.05; maxScale: 2.0;">
        
        <a-gltf-model
          id="catAugmentation"
          src="#anchoredModel"
          position="0 0 0"
          rotation="0 0 0"
          scale="0.25 0.25 0.25"
          animation-mixer>
        </a-gltf-model>

        <a-text
          id="catDescription"
          value="Happy Cat"
          position="0 -0.5 0.2" 
          scale="0.5 0.5 0.5"
          color="#FFFFFF"
          align="center"
          width="4">
        </a-text>

      </a-entity>
    </a-entity>
    
  </a-scene>

  <script>
    const sceneEl = document.querySelector("#scene");
    const startButton = document.querySelector("#startButton");
    const statusEl = document.querySelector("#status");
    const targetEl = document.querySelector("#catTarget");

    const isHeadset = /Quest|Oculus|Pico/i.test(navigator.userAgent);

    function setStatus(text, className) {
      statusEl.textContent = text;
      statusEl.classList.remove("found", "lost");
      statusEl.classList.add(className);
    }

    startButton.addEventListener("click", async () => {
      startButton.classList.add("hidden");

      if (isHeadset) {
        try {
          setStatus("Configuring tracking matrices...", "lost");
          document.body.classList.add("hide-video");

          // 1. Fetch the image directly from the asset gallery
          const imgEl = document.querySelector('#questTargetImage');
          if (!imgEl.complete) {
            await new Promise((resolve) => imgEl.onload = resolve);
          }
          
          // 2. Convert to an optimized hardware Bitmap
          const bitmap = await createImageBitmap(imgEl);
          
          // 3. Inject explicitly into A-Frame's core WebXR component options
          // This ensures the parameter is baked in before the hardware initializes
          sceneEl.setAttribute('webxr', {
            optionalFeatures: ['image-tracking', 'local-floor'],
            requiredFeatures: []
          });

          // Wait for a single engine microtask cycle to ensure parameters bind
          await new Promise(resolve => setTimeout(resolve, 50));

          // Directly seed the underlying Three.js WebXR Manager array bypass
          sceneEl.systems['webxr'].sessionConfiguration.trackedImages = [
            {
              image: bitmap,
              widthInMeters: 0.2 // Size of a standard A4 printed paper width
            }
          ];
          
          // 4. Fire AR engine
          sceneEl.enterVR(true); 
          setStatus("Scanning for printed image...", "lost");
        } catch (err) {
          console.error("Quest hardware setup failed:", err);
          setStatus("Quest AR Error", "lost");
        }
      } else {
        // Mobile fallback tracking path (iOS/Android)
        try {
          const mindarSystem = sceneEl.systems["mindar-image-system"];
          await mindarSystem.start();
          setStatus("Scanning for cat image…", "lost");
        } catch (error) {
          console.error(error);
          setStatus("Camera failed to start", "lost");
        }
      }
    });

    // Device status overlay updates
    targetEl.addEventListener("targetFound", () => {
      setStatus("Cat image found — augmentation anchored", "found");
    });

    targetEl.addEventListener("targetLost", () => {
      setStatus("Target lost — point at the cat image", "lost");
    });
  </script>
</body>
</html>
